concurrency:
    cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    group: ${{ github.workflow }}-${{ github.ref }}

env:
    CI: 1

jobs:
    build:
        if: github.actor != 'dependabot[bot]'
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

            - name: Install pnpm
              uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
              with:
                  version: latest

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version-file: .nvmrc

            - id: pnpm-store
              name: Get pnpm store path
              run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache pnpm store
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                  path: ${{ steps.pnpm-store.outputs.path }}
                  restore-keys: ${{ runner.os }}-pnpm-

            # https://docs.astral.sh/uv/guides/integration/github/
            - name: Install uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
              with:
                  enable-cache: true

            # https://just.systems/man/en/github-actions.html
            - name: Install Just
              uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3

            - name: Cache Cargo
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      rust/target/
                  restore-keys: ${{ runner.os }}-cargo-

            - name: Cache NuGet
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
              with:
                  key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.csproj') }}
                  path: ~/.nuget/packages
                  restore-keys: ${{ runner.os }}-nuget-

            - if: runner.os == 'Linux'
              name: Install Linux libraries
              run: sudo apt-get install -y cpanminus

            - if: runner.os == 'macOS'
              name: Install MacOS libraries
              run: brew install clang-format cpanminus

            - name: Install dependencies
              run: just install

            - name: Spellcheck
              run: just spellcheck

            - name: JavaScript tests
              run: just javascript

            - name: Python tests
              run: just python

            - name: C++ tests
              run: just cpp

            - name: Perl tests
              run: just perl

            - name: Rust tests
              run: just rust

            - name: C# tests
              run: just csharp

        strategy:
            fail-fast: false
            matrix:
                os:
                    - macos-15
                    - ubuntu-24.04

name: build

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:
